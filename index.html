<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog AR Mini</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            background-color: #f4f4f4;
        }
        /* Mengatur ukuran kanvas 3D */
        model-viewer {
            width: 100%;
            max-width: 400px;
            height: 500px;
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-top: 20px;
            border-radius: 10px;
        }

        button {
            background-color: #007bff; 
            color: white; border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            position: absolute; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Katalog Sepatu 3D</h2>

    <model-viewer 
        src="sepatu.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate
        shadow-intensity="1">
        
        <button slot="ar-button">
            Lihat di Ruangan (AR)
        </button>
    </model-viewer>

</body>
</html>
